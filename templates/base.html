<!doctype html>
<html lang="{{ lang }}" data-authed="{{ 'true' if current_user.is_authenticated else 'false' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ t('meta.description') }}">
  <title>{% block title %}EcoPulse — Air Quality Intelligence for Uzbekistan{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <script src="{{ url_for('static', filename='js/ui.js') }}" defer></script>
  {% block head %}{% endblock %}
</head>
<body>
  {% include "_icons.html" %}
  {% block body %}{% endblock %}
</body>
</html>
